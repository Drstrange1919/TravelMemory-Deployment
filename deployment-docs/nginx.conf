upstream backend_servers {

    server 54.224.248.52:3000;
    server 13.220.251.208:3000;
}

server {

    server_name univone3.me www.univone3.me;

    root /var/www/travelmemory;

    index index.html;

    location / {

        try_files $uri /index.html;
    }

    location /api/ {

        proxy_pass http://backend_servers/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/univone3.me/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/univone3.me/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}


server {
    if ($host = www.univone3.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = univone3.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot



    listen 80;

    server_name univone3.me www.univone3.me;
    return 404; # managed by Certbot




}